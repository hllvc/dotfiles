# ctrl+f prefix — matches tmux prefix (auto-exits after one key)
keybind = ctrl+f=activate_key_table_once:prefix

# Splits (mirrors tmux: C-v=right, C-s=down)
keybind = prefix/ctrl+v=new_split:right
keybind = prefix/ctrl+s=new_split:down
keybind = prefix/ctrl+z=toggle_split_zoom
keybind = prefix/shift+e=equalize_splits
keybind = prefix/x=close_surface

# Tabs
keybind = prefix/c=new_tab
keybind = prefix/n=next_tab
keybind = prefix/p=previous_tab
keybind = prefix/comma=prompt_tab_title

# Scrollback search
keybind = prefix/slash=start_search

# Direct split nav — matches tmux M-h/j/k/l
keybind = performable:option+h=goto_split:left
keybind = performable:option+j=goto_split:down
keybind = performable:option+k=goto_split:up
keybind = performable:option+l=goto_split:right

keybind = cmd+w=close_window
